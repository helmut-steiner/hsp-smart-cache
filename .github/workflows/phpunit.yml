name: PHPUnit

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PHPUnit in wp-env
        shell: pwsh
        run: ./bin/run-wp-env-tests.ps1

      - name: Stop wp-env
        if: always()
        run: npm run wp-env:stop
